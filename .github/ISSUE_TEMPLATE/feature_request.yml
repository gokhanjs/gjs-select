name: Feature request
description: Suggest an idea, or an Ant Design Select behavior to match
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do that gjs-select doesn't support yet?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What API or behavior would you like? If it mirrors an antd Select prop, name it.
    validations:
      required: false
